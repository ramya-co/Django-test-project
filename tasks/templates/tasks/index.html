{% extends "tasks/base.html" %}

{% block content %}
<h1>📋 My To-Do List</h1>

<div style="text-align: center; margin-bottom: 10px;">
    <form method="get" action="{% url 'search_tasks' %}" style="display: inline;">
        <input type="text" name="q" placeholder="Search tasks..." style="padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px;">
        <button type="submit" style="padding: 5px 12px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer;">🔍 Search</button>
    </form>
</div>

<div style="text-align: center; margin-bottom: 16px;">
    <form method="get" action="{% url 'index' %}" style="display: inline;">
        <label for="sort" style="font-size: 0.9em; color: #555;">Sort by:</label>
        <select name="sort" id="sort" onchange="this.form.submit()" style="padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; margin-left: 4px;">
            <option value="newest" {% if sort == 'newest' %}selected{% endif %}>Newest first</option>
            <option value="oldest" {% if sort == 'oldest' %}selected{% endif %}>Oldest first</option>
            <option value="alpha"  {% if sort == 'alpha'  %}selected{% endif %}>A → Z</option>
        </select>
    </form>
</div>

<form method="post" action="{% url 'add_task' %}" class="add-task-form">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Add a new task..." required>
    <input type="text" name="reminder" placeholder="Reminder time (HH:MM)" style="padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; margin-left: 6px; width: 160px;">
    <button type="submit">Add Task</button>
</form>

{% if tasks %}
<ul class="task-list">
    {% for task in tasks %}
    <li class="task-item {% if task.completed %}completed{% endif %}">
        <span class="task-title">{{ task.title }}</span>
        <div class="task-actions">
            <form method="post" action="{% url 'toggle_task' task.id %}" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-toggle">
                    {% if task.completed %}Undo{% else %}Done{% endif %}
                </button>
            </form>
            <form method="post" action="{% url 'delete_task' task.id %}" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-delete">Delete</button>
            </form>
        </div>
    </li>
    {% endfor %}
</ul>
{% else %}
<div class="empty-state">
    <p>No tasks yet. Add one above to get started!</p>
</div>
{% endif %}
{% endblock %}
